<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" fill="none" role="img" aria-label="طفل يتعلم البرمجة">
  <title>طفل يتعلم البرمجة</title>
  <rect width="800" height="800" rx="40" fill="#f3f4ff"/>
  <g transform="translate(120,140)">
    <ellipse cx="280" cy="480" rx="260" ry="40" fill="rgba(16,24,40,0.06)" />
    <!-- Laptop -->
    <rect x="140" y="220" width="280" height="180" rx="16" fill="#111827" />
    <rect x="160" y="240" width="240" height="120" rx="8" fill="#ffffff" />
    <rect x="220" y="300" width="120" height="8" rx="4" fill="#e6eefc" />
    <!-- Child head -->
    <circle cx="200" cy="120" r="48" fill="#ffdca8" />
    <!-- Hair -->
    <path d="M160 110c12-36 80-52 112-20" stroke="#3b3a57" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Eyes -->
    <circle cx="185" cy="120" r="6" fill="#111827" />
    <circle cx="215" cy="120" r="6" fill="#111827" />
    <!-- Smile -->
    <path d="M180 138q20 14 40 0" stroke="#b85d3c" stroke-width="4" stroke-linecap="round" fill="none" />
    <!-- Body -->
    <rect x="150" y="160" width="120" height="120" rx="20" fill="#6b8aff" />
    <rect x="170" y="180" width="80" height="80" rx="12" fill="#ffffff" opacity="0.06" />
    <!-- Decorative stars -->
    <circle cx="60" cy="60" r="8" fill="#ffd700" />
    <circle cx="380" cy="20" r="6" fill="#ffb86b" />
    <circle cx="460" cy="90" r="10" fill="#bde6ff" />
  </g>
</svg>
