<!-- Bottom Input Area -->
<footer class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-4 py-3 flex items-center gap-2 z-50">
<div class="flex items-center gap-1">
<button class="w-9 h-9 flex items-center justify-center text-primary hover:bg-surface-container-low rounded-full transition-all active:scale-90">
<span class="material-symbols-outlined">add_circle</span>
</button>
<button class="w-9 h-9 flex items-center justify-center text-primary hover:bg-surface-container-low rounded-full transition-all active:scale-90">

<span class="material-symbols-outlined">mic</span>
</button>

<div class="flex-1 relative">
<input class="w-full bg-surface-container-high border-none rounded-full px-4 py-2 focus:ring-2 focus:ring-primary-container text-body-md font-body-md placeholder-on-surface-variant" placeholder="اكتب رسالة..." type="text"/>
<button class="absolute left-2 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-primary opacity-60">
<span class="material-symbols-outlined">sentiment_satisfied</span>
</button>
</div>
<button class="w-10 h-10 flex items-center justify-center text-primary-container transition-all active:scale-75" id="send-button">
<span class="material-symbols-outlined text-[28px]" id="interaction-icon" style="font-variation-settings: 'FILL' 1;">thumb_up</span>
</button>
</footer>
<script>
        const input = document.querySelector('input');
        const icon = document.getElementById('interaction-icon');
        const sendBtn = document.getElementById('send-button');

        input.addEventListener('input', (e) => {
            if (e.target.value.trim().length > 0) {
                icon.innerText = 'send';
                icon.style.color = '#1a365d';
            } else {
                icon.innerText = 'thumb_up';
            }
        });

        // Simple mock send interaction
        sendBtn.addEventListener('click', () => {
            if (input.value.trim().length > 0) {
                const main = document.querySelector('main');
                const msg = document.createElement('div');
                msg.className = 'flex flex-col items-end gap-1 animate-in fade-in slide-in-from-bottom-2 duration-300';
                msg.innerHTML = `
                    <div class="max-w-[85%] bg-primary-container text-white px-4 py-2 message-sent font-body-md text-body-md shadow-sm">
                        ${input.value}
                    </div>
                    <div class="flex items-center gap-1 mt-1">
                        <span class="text-[10px] text-on-surface-variant">جاري الإرسال...</span>
                    </div>
                `;
                main.appendChild(msg);
                input.value = '';
                icon.innerText = 'thumb_up';
                main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' });
                
                // Simulate "Sent" status update
                setTimeout(() => {
                    msg.querySelector('span').innerText = 'تم الإرسال';
                }, 1000);
            }
        });
    </script>
