<style>

<body class="flex flex-col min-h-screen bg-surface">
<main class="flex-grow flex flex-col items-center justify-center px-md py-xl animate-fade-in">
<!-- Top Section: Institutional Logo & Welcome -->
<header class="w-full max-w-sm flex flex-col items-center text-center mb-lg">
<div class="mb-md">
<img alt="TKA-Egypt Academy Logo" class="w-32 h-32 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLvuquu1xKad2ia-r3AhjBls2_Iu9MxIW66NFGhbLc_rut9UPa9TCx3-BdQO8Wf-5-QprnOybhGibd3n_9Hy4kDewkXmuNTybr13uvaIBvGG412K6Ag3jMW2qz6F_C0j-lSlMhN7J23FXpdASGW_u0m6VEKPP906E02z7ZYwhIAmf9jtJ_wvGciIoCXyYM_OcNpC4tJ9dNLgvZ3Fk60ae8q9MmpbSnFmCJ58FCZYT51G2X_nGuyu-TF4tA"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Access your academic portal</p>
</header>
<!-- Middle Section: Form -->
<section class="w-full max-w-sm bg-surface-container-lowest p-md rounded-xl login-card border border-outline-variant">
<form class="space-y-md">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-md text-label-md text-primary" for="email">Email Address</label>
<div class="relative">
<input class="w-full px-md py-sm rounded-lg border border-outline focus:border-2 focus:border-primary focus:ring-0 transition-all text-on-surface" id="email" name="email" placeholder="admin@tka-egypt.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-primary" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full px-md py-sm pr-xl rounded-lg border border-outline focus:border-2 focus:border-primary focus:ring-0 transition-all text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full py-md bg-primary text-on-primary rounded-lg font-label-md text-label-md uppercase tracking-wider hover:opacity-90 active:scale-95 transition-all shadow-md" type="submit">
                    Sign In
                </button>
<!-- Forgot Password -->
<div class="text-center pt-base">
<a class="font-label-md text-label-md text-secondary font-bold hover:underline" href="#">Forgot Password?</a>
</div>
</form>
</section>
</main>
<!-- Bottom Section: Technical Support Footer -->
<footer class="w-full mt-auto bg-surface-container px-md py-lg border-t border-outline-variant">
<div class="max-w-sm mx-auto flex flex-col items-center gap-md">
<div class="flex items-center gap-xs">
<span class="font-body-sm text-body-sm text-on-surface-variant">Need help?</span>
<span class="font-body-sm text-body-sm text-primary font-bold">Contact Admin</span>
</div>
<a class="w-full flex items-center justify-center gap-base py-sm bg-secondary-container text-on-secondary-container rounded-full font-label-md text-label-md border border-on-secondary-fixed-variant/20 hover:shadow-lg transition-all active:scale-95" href="https://wa.me/#">
<span class="material-symbols-outlined text-[20px]" data-icon="forum">forum</span>
                Contact Support via WhatsApp
            </a>
<p class="font-body-sm text-body-sm text-on-surface-variant opacity-60">© 2024 AcademyPro Egyptian Institutional Management</p>
</div>
</footer>
<script>
        // Password Visibility Toggle Logic
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('togglePassword');
        const iconSpan = toggleBtn.querySelector('.material-symbols-outlined');

        toggleBtn.addEventListener('click', () => {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            iconSpan.textContent = isPassword ? 'visibility_off' : 'visibility';
        });

        // Form Submit Simulation
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('Redirecting to Dashboard...');
                btn.textContent = originalText;
                btn.disabled = false;
            }, 1500);
        });
    </script>
